# Typos configuration. See https://github.com/crate-ci/typos
#
# Ignore false positives we'd otherwise trip on:
#   - "PN" inside "PNGs" gets flagged as "ON"
#   - design/research docs contain transcribed chat snippets with typos
#     we do not own and don't want to edit after-the-fact.
[default]
extend-ignore-re = [
    "PNGs",
]

[default.extend-words]
# "seeked" is the idiomatic past tense for AVPlayer / MediaSession "seek
# to position" callbacks — typos flags it as "sought", which is wrong
# for the verb's usage in audio APIs.
seeked = "seeked"
# "missable" as in "un-missable" (standard English for "can't miss").
# typos keeps suggesting "miscible".
missable = "missable"

[files]
extend-exclude = [
    "design/chats/**",
    "research/**",
    "target/**",
    ".build/**",
    "macos/.build/**",
    "macos/Jellify.xcframework/**",
]
